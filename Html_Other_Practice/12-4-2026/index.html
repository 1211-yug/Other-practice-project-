<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<title> Home </title>
		<link href="./image/home.png" rel="icon">
		<style>

			.bg{
			    position: relative;
			}

			.bg img{
			    width: 100%;
    			height: 883px;
			    object-fit: cover;
			    filter: blur(4px);
			}

			.pa{
			    position: absolute;
			    top: 0;
			    width: 100%;
			}

			.logo{
				padding: 10px 140px;
			    font-size: 35px;
			    font-weight: bold;
			    color: black;
			}

			.nav a{
			    color: black;
			    padding: 0px 26px;
			    font-size: 20px;
				font-weight: 700;
				text-decoration: none;
			}

			.nav a:hover{
				text-decoration: underline;
			}

			.speace{
				padding-left: 700px;
			}

			.Dhome{
				text-align: center;
				color: #0D0C0C;
				padding-top: 13%;
				font-size: 25px;
				font-weight: 700;
			}

			.btn{
				border: 3px solid black;
				background: transparent;
				padding: 10px 15px;
				border-radius: 25px;
				font-size: 25px;
				font-weight: 700;
			}

			.btn:hover{
				background: #9DF5A9;
				font-weight: 700;
				cursor: pointer;
			}

		</style>
	</head>
	<body>
		<div class="bg">
			<img src="./image/bghome.jpg">
		</div>
		<div class="pa">
			<header>
				<table class="header">
					<tr>
						<td class="logo">
							LOGO
						</td>
						<td class="speace">
						</td>
						<td class="nav">
							<nav>
								<a href=""> Home </a>
								<a href=""> Bedrome </a>
								<a href=""> Dining </a>
								<a href=""> Kitchen </a>
								<a href=""> Backyard </a>
								<a href=""> Contact Me </a>
							</nav>
						</td>
					</tr>
				</table>
			</header>
			<div class="Dhome">
				<h1> DESIGN YOUR HOUSE </h1>
				<p> A cozy, open-plan modern sanctuary bathed in natural light, <br>
					designed for both peaceful relaxation and seamless entertaining. <p>
				<div>
					<button type="button" class="btn"> WATCH MORE </button>
				</div>
			</div>
		</div>
	</body>
</html>
